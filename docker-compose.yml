services:
  db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
      - ./ml/scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark

  prestart:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: backend-prestart
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/data/datasets
      - ./model_artifacts:/model_artifacts:ro
      - /data/projects/Algo-trade-monorepo/logs:/data/pipeline_logs:ro
      - /home/ubuntu/.ssh/nibi_key:/root/.ssh/nibi_key:ro
      - /home/ubuntu/.ssh/cm:/root/.ssh/cm:ro
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - PIPELINE_LOGS_DIR=/data/pipeline_logs
      - MODEL_ARTIFACTS_DIR=/model_artifacts
      - NIBI_USER=${NIBI_USER:-harshsaw}
      - NIBI_HOST=${NIBI_HOST:-nibi.sharcnet.ca}
      - NIBI_SSH_KEY=/root/.ssh/nibi_key

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/" ]
      interval: 10s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    image: maverick-streamlit
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
    depends_on:
      - backend


  # ── Airflow init — runs db migrate + creates admin user, then exits ──────────
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: maverick-airflow
    depends_on:
      db: {condition: service_healthy}
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  # ── Airflow webserver — UI on :8081 ──────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: maverick-airflow
    restart: always
    ports:
      - "8081:8080"
    group_add:
      - "1000"   # ubuntu GID — allows access to the SSH ControlMaster socket (mode 660)
    depends_on:
      db: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    volumes:
      - /data/projects/Algo-trade-monorepo/airflow/airflow/dags:/opt/airflow/dags/algo_trade:ro
      - airflow-logs:/opt/airflow/logs
      - /data/projects/Algo-trade-monorepo:/data/projects/Algo-trade-monorepo
      - /data/projects/the-project-maverick/model_artifacts:/data/projects/the-project-maverick/model_artifacts:ro
      - /home/ubuntu/.ssh/nibi_key:/home/airflow/.ssh/nibi_key:ro
      - /home/ubuntu/.ssh/cm:/home/airflow/.ssh/cm
    command: webserver

  # ── Airflow scheduler — picks up and runs DAG tasks ──────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: maverick-airflow
    restart: always
    group_add:
      - "1000"   # ubuntu GID — allows access to the SSH ControlMaster socket (mode 660)
    depends_on:
      db: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - OLD_DB_HOST=db
      - OLD_DB_PORT=5432
      - OLD_DB_NAME=${POSTGRES_DB}
      - OLD_DB_USER=${POSTGRES_USER}
      - OLD_DB_PASSWORD=${POSTGRES_PASSWORD}
      - NIBI_USER=harshsaw
      - NIBI_HOST=nibi.sharcnet.ca
      - NIBI_SSH_KEY=/home/airflow/.ssh/nibi_key
      - NIBI_SOCKET_DIR=/home/airflow/.ssh/cm
      - BACKEND_URL=http://backend:8000
    volumes:
      - /data/projects/Algo-trade-monorepo/airflow/airflow/dags:/opt/airflow/dags/algo_trade:ro
      - airflow-logs:/opt/airflow/logs
      - /data/projects/Algo-trade-monorepo:/data/projects/Algo-trade-monorepo
      - /data/projects/the-project-maverick/model_artifacts:/data/projects/the-project-maverick/model_artifacts:ro
      - /home/ubuntu/.ssh/nibi_key:/home/airflow/.ssh/nibi_key:ro
      - /home/ubuntu/.ssh/cm:/home/airflow/.ssh/cm
    command: scheduler


volumes:
  app-db-data:
  airflow-logs:
