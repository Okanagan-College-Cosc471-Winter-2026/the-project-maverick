name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  backend-essential:
    name: Backend Essential Checks
    runs-on: ubuntu-latest
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ci-password
      POSTGRES_DB: app
      ENVIRONMENT: local
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
        working-directory: backend
      - run: python -m py_compile app/main.py app/modules/inference/service.py app/modules/data/api.py
        working-directory: backend
      - run: uv run pytest -q tests/api/test_utils.py tests/scripts/test_backend_pre_start.py tests/scripts/test_test_pre_start.py
        working-directory: backend

  streamlit-smoke:
    name: Streamlit Smoke Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile frontend_streamlit/app.py frontend_streamlit/api.py

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: backend, dockerfile: docker/backend/Dockerfile }
          - { name: streamlit, dockerfile: docker/streamlit/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
